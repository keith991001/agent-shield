name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-headers-$(uname -r)

      - name: setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt -d would reformat:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go generate (regenerates eBPF bindings)
        run: go generate ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -v ./...
