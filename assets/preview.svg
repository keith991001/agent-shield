<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" viewBox="0 0 820 340" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <rect width="820" height="340" fill="#0e1117"/>

  <!-- header bar -->
  <rect x="0" y="0" width="820" height="80" fill="#161b22"/>
