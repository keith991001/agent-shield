    <rect x="20" y="138" width="780" height="42" rx="3" fill="rgba(248,81,73,0.08)"/>
    <rect x="20" y="138" width="3"   height="42" fill="#f85149"/>
    <text x="38"  y="156" fill="#8b949e" font-size="11">13:42:15.234</text>
