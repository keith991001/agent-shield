    <text x="38"  y="208" fill="#8b949e" font-size="11">13:42:15.111</text>
    <text x="146" y="208" fill="#58a6ff" font-weight="600">openat</text>
    <text x="234" y="208" fill="#c9d1d9">cat</text>
    <text x="270" y="208" fill="#8b949e" font-size="11">(8420)</text>
    <text x="318" y="208" fill="#8b949e">/etc/shadow</text>
    <text x="780" y="208" fill="#db6d28" font-weight="700" font-size="11" text-anchor="end">ALERT · sensitive_path_read</text>
    <text x="120" y="226" fill="#db6d28" font-size="11">risk 85 · exfiltration — /etc/shadow reveals password hashes…</text>

    <!-- log row 1 -->
    <rect x="20" y="244" width="3" height="22" fill="#8b949e"/>
    <text x="38"  y="260" fill="#8b949e" font-size="11">13:42:14.005</text>
    <text x="146" y="260" fill="#58a6ff" font-weight="600">exec</text>
    <text x="234" y="260" fill="#c9d1d9">bash</text>
    <text x="276" y="260" fill="#8b949e" font-size="11">(8419)</text>
    <text x="324" y="260" fill="#8b949e">/usr/bin/ls</text>

    <!-- log row 2 -->
    <rect x="20" y="270" width="3" height="22" fill="#8b949e"/>
    <text x="38"  y="286" fill="#8b949e" font-size="11">13:42:14.001</text>
    <text x="146" y="286" fill="#58a6ff" font-weight="600">connect</text>
    <text x="234" y="286" fill="#c9d1d9">curl</text>
    <text x="276" y="286" fill="#8b949e" font-size="11">(8418)</text>
    <text x="324" y="286" fill="#8b949e">1.1.1.1:443 (AF_INET)</text>
